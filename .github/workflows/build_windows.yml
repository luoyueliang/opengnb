name: Build GNB For Windows (MinGW)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  PROJECT: gnb
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Install MinGW-w64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Tweak Makefile for static linking (best-effort)
        run: |
          MF="src/Makefile.mingw_x86_64"
          if [ -f "$MF" ]; then
            sed -i 's/\(\$(CC) -o \$(GNB_CTL)\)/\1 -static/' "$MF" || true
            sed -i 's/\(\$(CC) -o \$(GNB_ES)\)/\1 -static/' "$MF" || true
            sed -i 's/\(\$(CC) -o \$(GNB_CRYPTO)\)/\1 -static/' "$MF" || true
            sed -i 's/\(\$(CC) -o \$(GNB_CLI)\)/\1 -static/' "$MF" || true
          fi

      - name: Build (MinGW cross)
        shell: bash
        run: |
          set -euo pipefail
          export PREFIX=x86_64-w64-mingw32
          export CC=$PREFIX-gcc
          export CXX=$PREFIX-g++
          export CPP=$PREFIX-cpp
          export LD=$PREFIX-ld
          export RANLIB=$PREFIX-ranlib
          export WINDRES=$PREFIX-windres
          export PATH="/usr/x86_64-w64-mingw32/bin:$PATH"
          export CFLAGS=-I/usr/x86_64-w64-mingw32/include/
          export LDFLAGS=-L/usr/x86_64-w64-mingw32/lib/

          OUT_DIR="$GITHUB_WORKSPACE/.out/${{ steps.tag.outputs.tag }}/windows/x86_64/bin"
          PKG_DIR="$GITHUB_WORKSPACE/.pkg/${{ steps.tag.outputs.tag }}"
          mkdir -p "$OUT_DIR" "$PKG_DIR"

          make -C src -f "Makefile.mingw_x86_64" clean
          make -C src -f "Makefile.mingw_x86_64" install
          if [ -d src/bin ]; then mv src/bin/* "$OUT_DIR/"; elif [ -d bin ]; then mv bin/* "$OUT_DIR/"; fi

      - name: Package
        run: |
          OUT_PARENT="$GITHUB_WORKSPACE/.out/${{ steps.tag.outputs.tag }}/windows/x86_64"
          PKG_DIR="$GITHUB_WORKSPACE/.pkg/${{ steps.tag.outputs.tag }}"
          ARCHIVE="${PROJECT}_windows_x86_64_${{ steps.tag.outputs.tag }}.tgz"
          tar -czvf "$ARCHIVE" -C "$OUT_PARENT" bin
          mkdir -p "$PKG_DIR"
          mv "$ARCHIVE" "$PKG_DIR/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnb-windows-x86_64
          path: .pkg/${{ steps.tag.outputs.tag }}/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .release/

      - name: Flatten artifacts
        run: |
          mkdir -p .release/flat
          find .release -type f -name "*.tgz" -exec mv {} .release/flat/ \;

      - name: Generate checksums
        run: |
          cd .release/flat
          sha256sum $(ls | grep -v '^checksums.txt$') > checksums.txt

      - name: Create/Update GitHub Release (clobber same-name assets only)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          FILES=(.release/flat/*)
          echo "Publishing release assets for $TAG: ${FILES[*]}"
          echo "Trying upload with --clobber (if release missing, will create then retry)"
          if ! gh release upload "$TAG" "${FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}"; then
            echo "Upload failed (release may not exist). Creating release then retrying upload..."
            gh release create "$TAG" --title "Release $TAG" --generate-notes --repo "${GITHUB_REPOSITORY}" || true
            gh release upload "$TAG" "${FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          fi

      - name: Upload to CTL release API
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CTL_TOKEN: ${{ secrets.CTL_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CTL_TOKEN:-}" ]]; then
            echo "CTL_RELEASE_TOKEN not set, skipping CTL upload."; exit 0; fi
          TAG="${{ github.ref_name }}"
          for f in .release/flat/*.tgz; do
            filename=$(basename "$f")
            platform=$(echo "$filename" | cut -d'_' -f2)
            arch=$(echo "$filename" | cut -d'_' -f3)
            version=$(echo "$filename" | cut -d'_' -f4- | sed 's/.tgz$//')
            echo "Uploading $filename to CTL (platform=$platform arch=$arch version=$version)..."
            curl -sf -X POST "https://ctl.mynet.club/api/v2/releases" \
              -H "Authorization: Bearer $CTL_TOKEN" \
              -F "product=gnb" \
              -F "version=${version}" \
              -F "platform=${platform}" \
              -F "arch=${arch}" \
              -F "file=@${f}" \
              -F "changelog=CI build" \
              -F "is_stable=1" || echo "CTL upload failed for $filename (non-fatal)"
          done
