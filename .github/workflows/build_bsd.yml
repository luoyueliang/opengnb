name: Build BSD

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  PROJECT: gnb
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-freebsd:
    runs-on: ubuntu-latest
    name: FreeBSD amd64 Build
    steps:
      - uses: actions/checkout@v4

      - name: Setup FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "13.2"
          usesh: true
          prepare: |
            pkg install -y gmake git

      - name: Build FreeBSD Binary
        uses: vmactions/freebsd-vm@v1
        with:
          run: |
            sed -i '' 's/^CC.*=/CC ?= cc/' Makefile.freebsd
            sed -i '' 's/^CFLAGS.*=/CFLAGS ?= -O2 -pipe/' Makefile.freebsd
            sed -i '' 's/^LDFLAGS.*=/LDFLAGS ?=/' Makefile.freebsd

            gmake -f Makefile.freebsd clean
            gmake -f Makefile.freebsd

            mkdir -p output
            cp gnb output/gnb-freebsd-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: gnb-freebsd-amd64
          path: output/gnb-freebsd-amd64

  build-openbsd:
    runs-on: ubuntu-latest
    name: OpenBSD amd64 Build
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenBSD VM
        uses: vmactions/openbsd-vm@v1
        with:
          release: "7.5"
          usesh: true
          prepare: |
            pkg_add gmake git

      - name: Build OpenBSD Binary
        uses: vmactions/openbsd-vm@v1
        with:
          run: |
            sed -i 's/^CC.*=/CC ?= cc/' Makefile.openbsd
            sed -i 's/^CFLAGS.*=/CFLAGS ?= -O2 -pipe/' Makefile.openbsd
            sed -i 's/^LDFLAGS.*=/LDFLAGS ?=/' Makefile.openbsd

            gmake -f Makefile.openbsd clean
            gmake -f Makefile.openbsd

            mkdir -p output
            cp gnb output/gnb-openbsd-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: gnb-openbsd-amd64
          path: output/gnb-openbsd-amd64

  release:
    runs-on: ubuntu-latest
    needs: [build-freebsd, build-openbsd]
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Display files
        run: ls -R ./artifacts

      - name: Release and Publish
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to CTL release API
        if: startsWith(github.ref, 'refs/tags/')
        env:
          CTL_TOKEN: ${{ secrets.CTL_RELEASE_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CTL_TOKEN:-}" ]]; then
            echo "CTL_RELEASE_TOKEN not set, skipping CTL upload."; exit 0; fi
          TAG="${{ github.ref_name }}"
          for f in artifacts/**/*.tgz artifacts/**/*; do
            [ -f "$f" ] || continue
            filename=$(basename "$f")
            # For BSD: file name format may be gnb-freebsd-amd64 (no underscores)
            # Try to parse platform and arch
            if [[ "$filename" == *.tgz ]]; then
              platform=$(echo "$filename" | cut -d'_' -f2)
              arch=$(echo "$filename" | cut -d'_' -f3)
              version=$(echo "$filename" | cut -d'_' -f4- | sed 's/.tgz$//')
            else
              continue
            fi
            echo "Uploading $filename to CTL (platform=$platform arch=$arch version=$version)..."
            curl -sf -X POST "https://ctl.mynet.club/api/v2/releases" \
              -H "Authorization: Bearer $CTL_TOKEN" \
              -F "product=gnb" \
              -F "version=${version}" \
              -F "platform=${platform}" \
              -F "arch=${arch}" \
              -F "file=@${f}" \
              -F "changelog=CI build" \
              -F "is_stable=1" || echo "CTL upload failed for $filename (non-fatal)"
          done
