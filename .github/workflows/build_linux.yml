name: Build GNB For Linux

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  PROJECT: gnb

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64,        makefile: Makefile.linux }
          - { arch: arm64,        makefile: Makefile.linux }
          - { arch: armv7-softfp, makefile: Makefile.linux }
          - { arch: armv7-hardfp, makefile: Makefile.linux }
          - { arch: mips,         makefile: Makefile.linux }
          - { arch: mipsel,       makefile: Makefile.linux }
          - { arch: mips64,       makefile: Makefile.linux }
          - { arch: mips64el,     makefile: Makefile.linux }
          - { arch: riscv64,      makefile: Makefile.linux }

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          df -h

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Install cross compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config wget curl git ca-certificates xz-utils tar file
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf || true
          sudo apt-get install -y gcc-mips-linux-gnu gcc-mipsel-linux-gnu gcc-mips64-linux-gnuabi64 gcc-mips64el-linux-gnuabi64 || true
          sudo apt-get install -y gcc-riscv64-linux-gnu || true

      - name: Setup cross compiler
        run: |
          STATIC_LINKING=false
          case "${{ matrix.arch }}" in
            amd64)
              export CC=gcc
              STATIC_LINKING=true
              ;;
            arm64)
              export CC=aarch64-linux-gnu-gcc
              STATIC_LINKING=true
              ;;
            armv7-softfp|armv7-hardfp)
              export CC=arm-linux-gnueabihf-gcc
              STATIC_LINKING=true
              ;;
            mips)
              export CC=mips-linux-gnu-gcc
              STATIC_LINKING=true
              ;;
            mipsel)
              export CC=mipsel-linux-gnu-gcc
              STATIC_LINKING=true
              ;;
            mips64)
              export CC=mips64-linux-gnuabi64-gcc
              STATIC_LINKING=true
              ;;
            mips64el)
              export CC=mips64el-linux-gnuabi64-gcc
              STATIC_LINKING=true
              ;;
            riscv64)
              export CC=riscv64-linux-gnu-gcc
              STATIC_LINKING=true
              ;;
          esac

          export CXX=${CC/gcc/g++}
          export AR=${CC/gcc/ar}
          export RANLIB=${CC/gcc/ranlib}

          # Architecture-specific flags
          case "${{ matrix.arch }}" in
            armv7-softfp)
              export CFLAGS="-march=armv7-a -mfloat-abi=soft"
              export LDFLAGS="-mfloat-abi=soft"
              ;;
            armv7-hardfp)
              export CFLAGS="-march=armv7-a -mfloat-abi=hard -mfpu=vfpv3-d16"
              export LDFLAGS="-mfloat-abi=hard"
              ;;
          esac

          if [ "$STATIC_LINKING" = "true" ]; then
            export CLI_LDFLAGS="-static"
            export GNB_ES_LDFLAGS="-static"
          fi

          echo "CC=$CC" >> $GITHUB_ENV
          echo "CXX=$CXX" >> $GITHUB_ENV
          echo "AR=$AR" >> $GITHUB_ENV
          echo "RANLIB=$RANLIB" >> $GITHUB_ENV
          echo "CFLAGS=${CFLAGS:-}" >> $GITHUB_ENV
          echo "LDFLAGS=${LDFLAGS:-}" >> $GITHUB_ENV
          echo "CLI_LDFLAGS=$CLI_LDFLAGS" >> $GITHUB_ENV
          echo "GNB_ES_LDFLAGS=$GNB_ES_LDFLAGS" >> $GITHUB_ENV
          echo "STATIC_LINKING=$STATIC_LINKING" >> $GITHUB_ENV

      - name: Build
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          OUT_DIR="$GITHUB_WORKSPACE/.out/${TAG}/linux/${{ matrix.arch }}/bin"
          PKG_DIR="$GITHUB_WORKSPACE/.pkg/${TAG}"
          mkdir -p "$OUT_DIR" "$PKG_DIR"

          make -C src -f "${{ matrix.makefile }}" clean

          echo "=== Build info ==="
          echo "CC:       $CC"
          echo "CFLAGS:   ${CFLAGS:-}"
          echo "LDFLAGS:  ${LDFLAGS:-}"
          echo "STATIC:   ${STATIC_LINKING}"
          echo "Makefile: ${{ matrix.makefile }}"

          make -C src -f "${{ matrix.makefile }}" install \
            CC="$CC" \
            CLI_LDFLAGS="${CLI_LDFLAGS}" \
            GNB_ES_LDFLAGS="${GNB_ES_LDFLAGS}"

          if [ -d src/bin ]; then
            mv src/bin/* "$OUT_DIR/"
          else
            echo "ERROR: src/bin not found after build"
            exit 1
          fi
          echo "=== Build complete ==="
          ls -lh "$OUT_DIR/"

      - name: Verify and strip binaries
        run: |
          set -e
          OUT_DIR="$GITHUB_WORKSPACE/.out/${{ steps.tag.outputs.tag }}/linux/${{ matrix.arch }}/bin"
          missing=0
          for f in gnb gnb_ctl gnb_es gnb_crypto; do
            if [ -f "$OUT_DIR/$f" ]; then
              info=$(file -b "$OUT_DIR/$f")
              size=$(stat -c%s "$OUT_DIR/$f")
              echo "$f: $info (${size} bytes)"

              # Strip with arch-specific tool
              STRIP_CMD="strip"
              case "${{ matrix.arch }}" in
                arm64)         command -v aarch64-linux-gnu-strip >/dev/null 2>&1 && STRIP_CMD="aarch64-linux-gnu-strip" ;;
                armv7-*)       command -v arm-linux-gnueabihf-strip >/dev/null 2>&1 && STRIP_CMD="arm-linux-gnueabihf-strip" ;;
                mipsel)        command -v mipsel-linux-gnu-strip >/dev/null 2>&1 && STRIP_CMD="mipsel-linux-gnu-strip" ;;
                mips)          command -v mips-linux-gnu-strip >/dev/null 2>&1 && STRIP_CMD="mips-linux-gnu-strip" ;;
                mips64)        command -v mips64-linux-gnuabi64-strip >/dev/null 2>&1 && STRIP_CMD="mips64-linux-gnuabi64-strip" ;;
                mips64el)      command -v mips64el-linux-gnuabi64-strip >/dev/null 2>&1 && STRIP_CMD="mips64el-linux-gnuabi64-strip" ;;
                riscv64)       command -v riscv64-linux-gnu-strip >/dev/null 2>&1 && STRIP_CMD="riscv64-linux-gnu-strip" ;;
              esac
              $STRIP_CMD "$OUT_DIR/$f" 2>/dev/null || true
              new_size=$(stat -c%s "$OUT_DIR/$f")
              echo "  stripped -> ${new_size} bytes (via $STRIP_CMD)"
            else
              echo "ERROR: $f not found in $OUT_DIR"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      - name: Package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          OUT_PARENT="$GITHUB_WORKSPACE/.out/${TAG}/linux/${{ matrix.arch }}"
          PKG_DIR="$GITHUB_WORKSPACE/.pkg/${TAG}"
          ARCHIVE="${PROJECT}_linux_${{ matrix.arch }}_${TAG}.tgz"
          tar -czvf "$ARCHIVE" -C "$OUT_PARENT" bin
          mv "$ARCHIVE" "$PKG_DIR/"

      - name: Cleanup build output
        if: always()
        run: |
          rm -rf "$GITHUB_WORKSPACE/.out" "$GITHUB_WORKSPACE/src/bin" || true
          make -C src -f "${{ matrix.makefile }}" clean 2>/dev/null || true
          df -h

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnb-linux-${{ matrix.arch }}
          path: .pkg/${{ steps.tag.outputs.tag }}/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .release/

      - name: Flatten artifacts
        run: |
          mkdir -p .release/flat
          find .release -type f -name "*.tgz" -exec mv {} .release/flat/ \;
          ls -lh .release/flat/

      - name: Generate and merge checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd .release/flat
          sha256sum *.tgz > new_checksums.txt

          # Merge with existing checksums from release (if any)
          TAG="${{ github.ref_name }}"
          mkdir -p .existing
          gh release download "$TAG" -p "checksums.txt" -D .existing/ \
            --repo "${GITHUB_REPOSITORY}" 2>/dev/null || true

          if [ -f .existing/checksums.txt ]; then
            new_files=$(awk '{print $2}' new_checksums.txt)
            while IFS= read -r line; do
              fname=$(echo "$line" | awk '{print $2}')
              if ! printf '%s\n' $new_files | grep -qxF "$fname"; then
                echo "$line"
              fi
            done < .existing/checksums.txt > kept.txt
            sort -k2 kept.txt new_checksums.txt > checksums.txt
          else
            sort -k2 new_checksums.txt > checksums.txt
          fi
          echo "=== Final checksums.txt ==="
          cat checksums.txt

          # Clean up intermediate files (do not upload them)
          rm -f new_checksums.txt kept.txt .existing/checksums.txt 2>/dev/null || true

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-linux
          path: .release/flat/checksums.txt

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          FILES=(.release/flat/*)
          echo "Uploading to release $TAG: ${FILES[*]}"
          gh release upload "$TAG" "${FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}" || {
            echo "Upload failed, creating release first..."
            gh release create "$TAG" --title "Release $TAG" --generate-notes --repo "${GITHUB_REPOSITORY}" || true
            gh release upload "$TAG" "${FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          }
