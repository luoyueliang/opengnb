name: Build GNB For OpenWrt (SDK 24.10)

# 使用官方 OpenWrt SDK 24.10 编译，对应本地 build_openwrt.sh 的逻辑
# 优势：GCC 13.3.0 + musl 1.2.5，与 OpenWrt 官方包使用同一工具链，兼容性最好
# 产物为动态链接 musl libc，OpenWrt 设备上有 musl 运行时，可直接运行

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

env:
  PROJECT: gnb
  SDK_VERSION: "24.10.0"
  SDK_GCC: "13.3.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: arm64,     sdk_target: armsr/armv8,      sdk_name: armsr-armv8,      sdk_libc: musl     }
          - { arch: amd64,     sdk_target: x86/64,           sdk_name: x86-64,           sdk_libc: musl     }
          - { arch: mipsel,    sdk_target: ramips/mt7621,    sdk_name: ramips-mt7621,    sdk_libc: musl     }   # hard-float
          - { arch: mipsel-sf, sdk_target: ramips/mt7620,    sdk_name: ramips-mt7620,    sdk_libc: musl     }   # soft-float (MT7620 等无 FPU 设备)
          - { arch: mips,      sdk_target: ath79/generic,    sdk_name: ath79-generic,    sdk_libc: musl     }   # soft-float (AR71xx/AR9xxx 无 FPU)
          - { arch: armv7,     sdk_target: bcm27xx/bcm2709,  sdk_name: bcm27xx-bcm2709,  sdk_libc: musl_eabi }  # hard-float
          # armv7-sf (mxs/generic) 暂时注释：i.MX28 等无 VFP 设备较罕见，且 OpenWrt 24.10 可能已放弃该 target
          # - { arch: armv7-sf, sdk_target: mxs/generic, sdk_name: mxs-generic, sdk_libc: musl }

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag
        id: tag
        run: echo "tag=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y build-essential wget zstd tar file

      - name: Cache OpenWrt SDK ${{ env.SDK_VERSION }} / ${{ matrix.arch }}
        id: sdk_cache
        uses: actions/cache@v4
        with:
          path: /opt/openwrt-sdk/${{ env.SDK_VERSION }}/${{ matrix.sdk_name }}
          key: openwrt-sdk-${{ env.SDK_VERSION }}-${{ matrix.sdk_name }}-gcc${{ env.SDK_GCC }}-v1

      - name: Download and extract OpenWrt SDK
        if: steps.sdk_cache.outputs.cache-hit != 'true'
        run: |
          SDK_FILE="openwrt-sdk-${{ env.SDK_VERSION }}-${{ matrix.sdk_name }}_gcc-${{ env.SDK_GCC }}_${{ matrix.sdk_libc }}.Linux-x86_64.tar.zst"
          SDK_URL="https://downloads.openwrt.org/releases/${{ env.SDK_VERSION }}/targets/${{ matrix.sdk_target }}/${SDK_FILE}"
          echo "Downloading SDK: $SDK_URL"
          wget -q --show-progress -O "/tmp/${SDK_FILE}" "$SDK_URL"
          mkdir -p "/opt/openwrt-sdk/${{ env.SDK_VERSION }}"
          cd "/opt/openwrt-sdk/${{ env.SDK_VERSION }}"
          tar --use-compress-program=unzstd -xf "/tmp/${SDK_FILE}"
          # 将解压出的目录统一重命名为 sdk_name，方便后续步骤定位
          EXTRACTED=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          if [ -z "$EXTRACTED" ]; then
            echo "ERROR: SDK extraction failed, no openwrt-sdk-* directory found"
            ls -la
            exit 1
          fi
          mv "$EXTRACTED" "${{ matrix.sdk_name }}"
          rm -f "/tmp/${SDK_FILE}"
          echo "SDK ready at: /opt/openwrt-sdk/${{ env.SDK_VERSION }}/${{ matrix.sdk_name }}"

      - name: Find SDK toolchain GCC
        id: toolchain
        run: |
          SDK_DIR="/opt/openwrt-sdk/${{ env.SDK_VERSION }}/${{ matrix.sdk_name }}"
          echo "SDK_DIR: $SDK_DIR"
          echo "Toolchain dirs:"
          ls "$SDK_DIR/staging_dir/" | grep toolchain || echo "(none)"

          # 找 *-openwrt-linux-*-gcc（排除 -cc 链接、g++ 等）
          CC=$(find "$SDK_DIR/staging_dir" -path "*/bin/*-openwrt-linux-*gcc" ! -name "*g++*" ! -name "*-cc" 2>/dev/null | head -1)
          if [ -z "$CC" ]; then
            echo "ERROR: Could not find GCC binary in SDK staging_dir"
            find "$SDK_DIR/staging_dir" -name "*gcc*" 2>/dev/null | head -20
            exit 1
          fi
          echo "Found CC: $CC"
          $CC --version | head -1

          STAGING_DIR="$SDK_DIR/staging_dir"
          echo "cc=$CC" >> "$GITHUB_OUTPUT"
          echo "staging_dir=$STAGING_DIR" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          STAGING_DIR: ${{ steps.toolchain.outputs.staging_dir }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          OUT_DIR="$GITHUB_WORKSPACE/.out/${TAG}/openwrt-sdk/${{ matrix.arch }}/bin"
          PKG_DIR="$GITHUB_WORKSPACE/.pkg/${TAG}"
          mkdir -p "$OUT_DIR" "$PKG_DIR"

          CC="${{ steps.toolchain.outputs.cc }}"
          echo "=== Build info ==="
          echo "CC:          $CC"
          echo "STAGING_DIR: $STAGING_DIR"
          echo "arch:        ${{ matrix.arch }}"
          echo "tag:         $TAG"
          echo ""

          # SDK 编译：不加 -static，OpenWrt 设备自带 musl 运行时，动态链接即可
          make -C src -f Makefile.openwrt clean
          make -C src -f Makefile.openwrt install \
            CC="$CC" \
            DEBUG=0

          if [ -d src/bin ]; then
            mv src/bin/* "$OUT_DIR/"
          else
            echo "ERROR: src/bin not found after build"
            exit 1
          fi
          echo "=== Build complete, output: ==="
          ls -lh "$OUT_DIR/"

      - name: Verify binaries
        run: |
          OUT_DIR="$GITHUB_WORKSPACE/.out/${{ steps.tag.outputs.tag }}/openwrt-sdk/${{ matrix.arch }}/bin"
          missing=0
          for f in gnb gnb_ctl gnb_es gnb_crypto; do
            if [ -f "$OUT_DIR/$f" ]; then
              info=$(file -b "$OUT_DIR/$f")
              size=$(stat -c%s "$OUT_DIR/$f")
              echo "$f: $info (${size} bytes)"
            else
              echo "ERROR: $f not found in $OUT_DIR"
              missing=1
            fi
          done
          [ $missing -eq 0 ] || exit 1

      - name: Package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          OUT_PARENT="$GITHUB_WORKSPACE/.out/${TAG}/openwrt-sdk/${{ matrix.arch }}"
          PKG_DIR="$GITHUB_WORKSPACE/.pkg/${TAG}"
          ARCHIVE="${PROJECT}_openwrt-sdk_${{ matrix.arch }}_${TAG}.tgz"
          tar -czvf "$ARCHIVE" -C "$OUT_PARENT" bin
          mv "$ARCHIVE" "$PKG_DIR/"
          echo "Packaged: $PKG_DIR/$ARCHIVE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gnb-openwrt-sdk-${{ matrix.arch }}
          path: .pkg/${{ steps.tag.outputs.tag }}/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: .release/

      - name: Flatten artifacts
        run: |
          mkdir -p .release/flat
          find .release -type f -name "*.tgz" -exec mv {} .release/flat/ \;
          ls -lh .release/flat/

      - name: Generate and merge checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd .release/flat
          # 生成本批次校验
          sha256sum *.tgz > new_checksums.txt

          # 尝试从 Release 下载已有 checksums.txt，合并（同文件名替换，新增追加）
          TAG="${{ github.ref_name }}"
          mkdir -p .existing
          gh release download "$TAG" -p "checksums.txt" -D .existing/ \
            --repo "${GITHUB_REPOSITORY}" 2>/dev/null || true

          if [ -f .existing/checksums.txt ]; then
            new_files=$(awk '{print $2}' new_checksums.txt)
            while IFS= read -r line; do
              fname=$(echo "$line" | awk '{print $2}')
              if ! printf '%s\n' $new_files | grep -qxF "$fname"; then
                echo "$line"
              fi
            done < .existing/checksums.txt > kept.txt
            sort -k2 kept.txt new_checksums.txt > checksums.txt
          else
            sort -k2 new_checksums.txt > checksums.txt
          fi
          echo "=== Final checksums.txt ==="
          cat checksums.txt

      - name: Upload checksums artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums-openwrt-sdk
          path: .release/flat/checksums.txt

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          FILES=(.release/flat/*)
          echo "Uploading to release $TAG: ${FILES[*]}"
          gh release upload "$TAG" "${FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}" || {
            echo "Upload failed, attempting to create release first..."
            gh release create "$TAG" --title "Release $TAG" --notes "OpenWrt SDK build" || true
            gh release upload "$TAG" "${FILES[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          }
